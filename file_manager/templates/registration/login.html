<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | MyCloud Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .btn-login {
            background: #0d6efd;
            border: none;
            padding: 0.7rem;
            font-weight: 600;
        }

        .brand-logo {
            font-size: 2rem;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-logo">📁 CloudDrive</div>
        <h4 class="text-center mb-4">Sign In</h4>

        {% if form.errors %}
        <div class="alert alert-danger p-2 small">
            Your username or password was incorrect.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted small">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-login">Login</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">Contact admin if you don't have an account.</p>
        </div>
    </div>

</body>

</html>
<script>
    // Agar user logout ho kar aya hai, to history replace kar do
    if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
    }
</script>
<script>
    // Detect back button
    window.addEventListener("pageshow", function (event) {
        var historyTraversal = event.persisted ||
            (typeof window.performance != "undefined" &&
                window.performance.navigation.type === 2);
        if (historyTraversal) {
            // Agar user back aya hai, to reload karo taake server session check kare
            window.location.reload();
        }
    });
</script>
